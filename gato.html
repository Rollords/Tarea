<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/assets/css/main.css">
    <title>Gatzu</title>
  </head>
  <body class="bg-gray-50 flex flex-col min-h-screen font-sans">
    <header class="flex justify-center p-8 bg-violet-400">
      <h1 class="text-6xl text-white font-medium">Gatzu</h1>
    </header>
    <section class=" border-violet-300 border-dashed border-2 m-5 md:text-2xl" >
    
        <div class="flex justify-center gap-5 my-5 md:gap-15" id="status">
            <div class="flex gap-2 text-violet-300">
                <span>Hambre:</span>
                <div class="relative w-20 h-8 bg-slate-700 border-2 border-slate-950 rounded-lg overflow-hidden shadow-inner md:w-40">
                <div id="hambre-bar" class="h-full w-0 bg-emerald-500 transition-all duration-300 ease-in-out"></div>
                <span id="hambre-text" class="absolute inset-0 flex items-center justify-center text-white font-bold text-sm">0 / 100</span>
            </div>
            </div>
            <div class="flex gap-2 text-violet-300">
                <span>Energia:</span>
                <div class="relative w-20 h-8 bg-slate-700 border-2 border-slate-950 rounded-lg overflow-hidden shadow-inner md:w-40">
                <div id="energia-bar" class="h-full w-full bg-amber-500 transition-all duration-300 ease-in-out"></div>
                <span id="energia-text" class="absolute inset-0 flex items-center justify-center text-white font-bold text-sm">100/100</span>
            </div>
            </div>
        </div>

        <div>
            <img class="p-2 w-2xl rounded-3xl m-auto" src="src/assets/img/gatzu/welcome.jpg" alt="Gatzu" id="img-change">
            <span class="text-center font-semibold text-3xl my-5 p-3 text-red-500 flex justify-center" id="status-text">Gatzu: Vamos a Jugar!</span>
        </div>
        <div class="flex justify-center gap-10 my-5" id="botones">
            <button class="btn-gato" id="play">Jugar</button>
            <button class="btn-gato" id="eat">Comer</button>
            <button class="btn-gato" id="sleep">Dormir</button>
        </div>
    </section>

    
    
    <a href="index.html" class=" bg-violet-400 text-white
    inline-block w-fit m-auto text-center py-5 px-2 rounded-full hover:bg-violet-600" >Volver</a>

    <footer"><p class="flex justify-center p-3 bg-violet-400 text-white text-lg mt-5 bottom-0">Pagina creada por Jose Melendez para el curso Endigital.</p></footer>


    
    <script type="module" src="/src/main.js"></script>
    <script src="js3.js"></script>
  </body>
</html>
